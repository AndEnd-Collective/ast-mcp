---
# Incomplete AI Implementation Detection
metadata:
  version: "1.0.0"
  author: "AndEnd Team"
  description: "Detects incomplete or placeholder implementations commonly generated by AI"
  creation_date: "2025-07-06"
  last_edit_date: "2025-07-06"
  use_case: "Identifying incomplete AI-generated code that needs human completion"

rule:
  id: incomplete-ai-implementation
  language: Any
  rule:
    any:
      # Common placeholder comments
      - pattern: "// TODO: Implement this"
      - pattern: "# TODO: Add implementation"
      - pattern: "/* Implementation needed */"
      - pattern: "// FIXME: Complete this function"
      - pattern: "# FIXME: Add error handling"
      - pattern: "// NOTE: This is a placeholder"
      
      # Placeholder return statements
      - pattern: "return null; // Placeholder"
      - pattern: "return None  # TODO"
      - pattern: "return {}; // Empty object"
      - pattern: "return []; // Empty array"
      - pattern: "throw new Error('Not implemented');"
      - pattern: "raise NotImplementedError()"
      
      # Generic variable assignments
      - pattern: "const result = null; // TODO"
      - pattern: "let data = undefined; // Placeholder"
      - pattern: "var value = 0; // Default"
      
      # Incomplete function bodies
      - pattern: |
          function $NAME($$$PARAMS) {
            // TODO: Implement
          }
      - pattern: |
          def $NAME($$$PARAMS):
              # TODO: Implement
              pass
      - pattern: |
          public $TYPE $NAME($$$PARAMS) {
              // TODO: Implement
              return null;
          }
      
      # Missing error handling
      - pattern: |
          try {
            $$$BODY
          } catch (error) {
            // TODO: Handle error
          }
      - pattern: |
          try:
              $$$BODY
          except Exception as e:
              # TODO: Handle exception
              pass
      
      # Placeholder API calls
      - pattern: "fetch('/api/placeholder')"
      - pattern: "requests.get('http://example.com')"
      - pattern: "axios.get('/api/todo')"
      
      # Generic test placeholders
      - pattern: |
          it('should $DESCRIPTION', () => {
            // TODO: Write test
          });
      - pattern: |
          def test_$NAME():
              # TODO: Implement test
              assert True
      
      # Configuration placeholders
      - pattern: "const CONFIG = {}; // TODO: Add config"
      - pattern: "config = {}  # TODO: Load from file"
      - pattern: "settings = null; // Configure this"
      
      # Database placeholders
      - pattern: "// TODO: Connect to database"
      - pattern: "# TODO: Setup database connection"
      - pattern: "const db = null; // TODO: Initialize"
      
      # Authentication placeholders
      - pattern: "// TODO: Add authentication"
      - pattern: "# TODO: Implement auth check"
      - pattern: "const isAuthenticated = true; // TODO: Real check"

  severity: medium
  message: "Incomplete AI implementation detected - requires manual completion"
  
  incomplete_patterns:
    function_stubs:
      - "Functions with only TODO comments"
      - "Methods returning placeholder values"
      - "Empty implementation blocks"
      - "NotImplementedError or similar exceptions"
      
    missing_logic:
      - "Conditional statements without proper conditions"
      - "Loops without proper iteration logic"
      - "Switch/case statements with empty cases"
      - "Event handlers without implementation"
      
    placeholder_data:
      - "Hardcoded test data instead of real logic"
      - "Static responses instead of dynamic processing"
      - "Mock API endpoints without real implementation"
      - "Dummy configuration values"
      
    incomplete_error_handling:
      - "Empty catch blocks with TODO comments"
      - "Generic error messages without specificity"
      - "Missing error recovery logic"
      - "Unhandled edge cases"

  ai_generation_indicators:
    common_ai_phrases:
      - "// This is a basic implementation"
      - "// TODO: Optimize this"
      - "// Placeholder implementation"
      - "// Add more features as needed"
      - "// This needs to be customized"
      
    incomplete_structure:
      - "Functions declared but not implemented"
      - "Classes with empty methods"
      - "Interfaces without proper implementation"
      - "Modules with placeholder exports"

  completion_checklist:
    immediate_requirements:
      - "Replace all TODO comments with actual implementation"
      - "Remove placeholder return values"
      - "Add proper error handling"
      - "Implement missing business logic"
      
    validation_steps:
      - "Test all functions with real data"
      - "Verify error handling with edge cases"
      - "Check performance with expected load"
      - "Validate security with untrusted input"
      
    documentation_needs:
      - "Add function documentation"
      - "Document API endpoints"
      - "Explain configuration options"
      - "Provide usage examples"

  examples:
    incomplete_ai_code:
      - |
        // ❌ Typical incomplete AI generation
        function processPayment(amount, cardDetails) {
          // TODO: Implement payment processing
          // This is a placeholder implementation
          const result = null;
          
          if (amount > 0) {
            // TODO: Validate card details
            // TODO: Process payment with payment gateway
            // TODO: Handle payment errors
            return { success: true }; // Placeholder response
          }
          
          return { success: false }; // TODO: Add proper error handling
        }
        
        async function fetchUserData(userId) {
          try {
            // TODO: Replace with real API endpoint
            const response = await fetch('/api/placeholder');
            const data = await response.json();
            return data;
          } catch (error) {
            // TODO: Handle different error types
            console.log(error);
          }
        }
        
    completed_implementation:
      - |
        // ✅ Complete implementation
        async function processPayment(
          amount: number, 
          cardDetails: CardDetails
        ): Promise<PaymentResult> {
          if (amount <= 0) {
            throw new InvalidAmountError('Amount must be greater than 0');
          }
          
          validateCardDetails(cardDetails);
          
          try {
            const paymentGateway = PaymentGatewayFactory.create();
            const result = await paymentGateway.processPayment({
              amount,
              cardDetails,
              metadata: { timestamp: new Date().toISOString() }
            });
            
            await auditLogger.logPayment(result);
            return result;
          } catch (error) {
            if (error instanceof PaymentGatewayError) {
              throw new PaymentProcessingError(
                'Payment failed', 
                { originalError: error, amount }
              );
            }
            throw error;
          }
        }
        
        async function fetchUserData(userId: string): Promise<UserData> {
          if (!userId || typeof userId !== 'string') {
            throw new InvalidUserIdError('Valid user ID required');
          }
          
          try {
            const response = await apiClient.get(`/users/${encodeURIComponent(userId)}`);
            
            if (!response.ok) {
              throw new UserFetchError(`Failed to fetch user: ${response.status}`);
            }
            
            const userData = await response.json();
            return UserDataSchema.parse(userData); // Validate response structure
          } catch (error) {
            logger.error('Failed to fetch user data', { userId, error });
            
            if (error instanceof UserFetchError) {
              throw error;
            }
            
            throw new UserServiceError('User data retrieval failed', { userId });
          }
        }