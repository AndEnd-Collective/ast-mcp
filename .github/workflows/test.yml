name: Test and Validation

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  
jobs:
  test:
    name: Run Tests and Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y curl
        
    - name: Install ast-grep binary
      run: |
        # Download and install ast-grep for testing
        curl -L https://github.com/ast-grep/ast-grep/releases/download/0.38.6/ast-grep-x86_64-unknown-linux-gnu.tar.gz -o ast-grep.tar.gz
        tar -xzf ast-grep.tar.gz
        chmod +x ast-grep
        sudo mv ast-grep /usr/local/bin/
        ast-grep --version
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        
    - name: Set environment variables
      run: |
        echo "PYTHONPATH=$GITHUB_WORKSPACE/src" >> $GITHUB_ENV
        
    - name: Verify installation
      run: |
        python -c "import ast_grep_mcp; print('Package installed successfully')"
        ast-grep --version
        
    - name: Run validation tests
      run: |
        echo "Running input validation tests..."
        python tests/test_validation.py
        
    - name: Run basic MCP functionality tests
      run: |
        echo "Running basic MCP functionality tests..."
        python tests/test_mcp.py
        
    - name: Run comprehensive test suite
      run: |
        echo "Running comprehensive test suite..."
        python tests/run_all_tests.py

  status-check:
    name: Overall Status Check
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    
    steps:
    - name: Check test results
      run: |
        echo "Test Results Summary:"
        echo "- Basic Tests: ${{ needs.test.result }}"
        
        if [[ "${{ needs.test.result }}" == "success" ]]; then
          echo "✅ All tests passed successfully!"
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "❌ Some tests failed!"
          echo "status=failure" >> $GITHUB_OUTPUT
          exit 1
        fi