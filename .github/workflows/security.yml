name: Security Scanning

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  semgrep:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Semgrep security scan
      uses: semgrep/semgrep-action@v1
      with:
        config: |
          auto
          p/security-audit
          p/python
      
    - name: Upload Semgrep results to GitHub
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: semgrep-results
        path: semgrep.sarif

  bandit:
    name: Bandit Security Scan  
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install Bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit[toml]
        
    - name: Run Bandit security scan
      run: |
        bandit -r src/ -f json -o bandit-results.json || true
        bandit -r src/ -f txt
        
    - name: Upload Bandit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-results
        path: bandit-results.json

  safety:
    name: Safety Dependency Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety
        pip install -e .
        
    - name: Run Safety dependency scan
      run: |
        safety check --json --output safety-results.json || true
        safety check
        
    - name: Upload Safety results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: safety-results
        path: safety-results.json

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [semgrep, bandit, safety]
    if: always()
    
    steps:
    - name: Security scan summary
      run: |
        echo "## 🛡️ Security Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Scan Status:**" >> $GITHUB_STEP_SUMMARY
        echo "- Semgrep: ${{ needs.semgrep.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Bandit: ${{ needs.bandit.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Safety: ${{ needs.safety.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [[ "${{ needs.semgrep.result }}" == "success" && "${{ needs.bandit.result }}" == "success" && "${{ needs.safety.result }}" == "success" ]]; then
          echo "✅ All security scans completed successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Some security scans had issues - please review the logs" >> $GITHUB_STEP_SUMMARY
        fi